<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WebPilot Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="wrap">
    <h1>WebPilot Settings</h1>

    <section>
      <h2>LLM Provider</h2>
      <div class="field">
        <label for="active-provider">Active provider</label>
        <select id="active-provider"></select>
      </div>

      <div id="provider-config">
        <div class="field" id="field-base-url">
          <label for="base-url">Base URL</label>
          <input type="text" id="base-url" placeholder="https://example.com/v1" />
        </div>
        <div class="field" id="field-api-key">
          <label for="api-key">API key <a id="key-link" href="#" target="_blank" rel="noreferrer">get a key ↗</a></label>
          <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" />
        </div>
        <div class="field">
          <label for="model">Model</label>
          <div class="row">
            <input type="text" id="model" list="model-list" placeholder="model id" />
            <button id="fetch-models" class="secondary" title="Fetch the model list from the provider">List models</button>
          </div>
          <datalist id="model-list"></datalist>
          <div id="models-status" class="hint"></div>
        </div>
      </div>
      <p class="hint">Keys are stored in <code>chrome.storage.local</code> on this device only and are sent directly to the provider you configured — nowhere else.</p>
    </section>

    <section>
      <h2>Appearance</h2>
      <div class="field inline">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </section>

    <section>
      <h2>Agent behavior</h2>
      <div class="field inline">
        <label for="max-steps">Max steps per task</label>
        <input type="number" id="max-steps" min="5" max="100" value="40" />
      </div>
      <div class="field inline">
        <label for="confirm-submit">Ask before clicking submit/apply/pay buttons</label>
        <input type="checkbox" id="confirm-submit" checked />
      </div>
      <div class="field inline">
        <label for="vision-mode">Vision mode — attach a screenshot on every step (needs a vision-capable model; higher token cost)</label>
        <input type="checkbox" id="vision-mode" />
      </div>
      <div class="danger-box">
        <div class="field inline">
          <label for="autonomous-mode"><strong>Autonomous mode — dangerous.</strong> The agent acts fully on your behalf: it never asks questions and clicks submit/apply/pay buttons <em>without</em> confirmation. You are responsible for everything it submits.</label>
          <input type="checkbox" id="autonomous-mode" />
        </div>
      </div>
    </section>

    <section>
      <h2>Your profile <span class="hint">(used to fill forms and job applications — never invented data)</span></h2>
      <div class="grid">
        <div class="field"><label>Full name</label><input type="text" id="p-fullName" /></div>
        <div class="field"><label>Email</label><input type="email" id="p-email" /></div>
        <div class="field"><label>Phone</label><input type="text" id="p-phone" /></div>
        <div class="field"><label>Location</label><input type="text" id="p-location" placeholder="City, Country" /></div>
        <div class="field"><label>LinkedIn URL</label><input type="text" id="p-linkedin" /></div>
        <div class="field"><label>Website / portfolio</label><input type="text" id="p-website" /></div>
        <div class="field"><label>Work authorization</label><input type="text" id="p-workAuthorization" placeholder="e.g. EU citizen, needs sponsorship for US" /></div>
        <div class="field"><label>Salary expectation</label><input type="text" id="p-salaryExpectation" /></div>
        <div class="field"><label>Notice period</label><input type="text" id="p-noticePeriod" placeholder="e.g. 1 month" /></div>
      </div>
      <div class="field">
        <label>Extra notes / answers to common screening questions</label>
        <textarea id="p-extraNotes" rows="5" placeholder="e.g. Years of experience with X: 5&#10;Willing to relocate: no&#10;Preferred pronouns: …"></textarea>
      </div>
      <div class="field">
        <label>Resume / CV (attached by the agent to file-upload fields)</label>
        <div class="row">
          <input type="file" id="resume-file" accept=".pdf,.doc,.docx" />
          <button id="resume-clear" class="secondary">Remove</button>
        </div>
        <div id="resume-status" class="hint"></div>
      </div>
    </section>

    <div class="save-row">
      <button id="save" class="primary">Save settings</button>
      <span id="save-status" class="hint"></span>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
